name: Build & Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
        compiler: [gcc-14, clang-19]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          cmake \
          libglfw3-dev \
          libglm-dev \
          libvulkan-dev \
          libssl-dev \
          zlib1g-dev \
          mesa-vulkan-drivers \
          xvfb

    - name: Set compiler
      run: |
        if [ "${{ matrix.compiler }}" = "gcc-14" ]; then
          sudo apt-get install -y -qq g++-14
          echo "CC=gcc-14" >> $GITHUB_ENV
          echo "CXX=g++-14" >> $GITHUB_ENV
        elif [ "${{ matrix.compiler }}" = "clang-19" ]; then
          sudo apt-get install -y -qq clang-19 lld-19
          echo "CC=clang-19" >> $GITHUB_ENV
          echo "CXX=clang++-19" >> $GITHUB_ENV
        fi

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run unit tests
      run: |
        cd build
        ctest --output-on-failure
      env:
        DISPLAY: ":99"
      if: ${{ matrix.compiler == 'gcc-14' }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs-${{ matrix.os }}-${{ matrix.compiler }}
        path: build/CMakeFiles/CMakeOutput.log
